<table class="w-full bg-white shadow rounded-xl overflow-hidden">

  <thead class="bg-gray-100">
    <tr>
      <th class="p-3">Item</th>
      <th class="p-3">Price</th>
      <th class="p-3">Margin</th>
      <th class="p-3">Demand</th>
      <th class="p-3">Action</th>
      <th class="p-3"></th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let item of insights" class="border-t hover:bg-gray-50">

      <td class="p-3">{{ item.name }}</td>
      <td class="p-3">₹{{ item.price }}</td>
      <td class="p-3">{{ item.marginPercent }}%</td>
      <td class="p-3">{{ item.demand }}</td>

      <td class="p-3">
        <span [ngClass]="{
          'text-green-600': item.action === 'Increase Price',
          'text-red-500': item.action === 'Reduce Price',
          'text-yellow-500': item.action === 'Review Cost'
        }">
          {{ item.action }}
        </span>
      </td>

      <td class="p-3">
        <button (click)="apply(item)"
                class="bg-blue-500 text-white px-3 py-1 rounded">
          Apply
        </button>
      </td>

    </tr>
  </tbody>

</table>
