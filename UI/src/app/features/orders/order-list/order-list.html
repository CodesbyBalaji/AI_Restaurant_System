<div class="bg-white shadow rounded-xl overflow-hidden">

  <table class="w-full text-left">
    <thead class="bg-gray-100">
      <tr>
        <th class="p-4">Item</th>
        <th class="p-4">Qty</th>
        <th class="p-4">Price</th>
        <th class="p-4">Status</th>
        <th *ngIf="isAdmin()" class="p-4 text-center">Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let order of orders" class="border-t hover:bg-gray-50">

        <td class="p-4">{{ order.menuItemName }}</td>

        <td class="p-4">{{ order.quantity }}</td>

        <td class="p-4 font-semibold text-blue-600">
          ₹{{ order.totalPrice }}
        </td>

        <td class="p-4">

          <select *ngIf="isManagerOrAdmin()"
                  [value]="order.status"
                  (change)="updateStatus(order.id, $any($event.target).value)"
                  class="px-2 py-1 border rounded">

            <option value="Pending">Pending</option>
            <option value="Preparing">Preparing</option>
            <option value="Completed">Completed</option>
          </select>

          <span *ngIf="!isManagerOrAdmin()"
                class="px-3 py-1 bg-yellow-100 text-yellow-700 rounded-full text-sm">
            {{ order.status }}
          </span>

        </td>

        <td class="p-4 text-center">

          <button *ngIf="isAdmin()"
                  (click)="deleteOrder(order.id)"
                  class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 text-sm">
            Delete
          </button>

        </td>

      </tr>
    </tbody>

  </table>

</div>
