<h2 class="text-2xl font-bold mb-6">Dashboard</h2>

<div class="bg-white p-6 rounded-xl shadow mb-6">
  <h3 class="text-gray-500">Total Revenue</h3>
  <p class="text-3xl font-bold text-blue-600">
    ₹{{ revenue }}
  </p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">

  <div class="bg-white p-4 rounded-xl shadow">
    <h3 class="mb-2 font-semibold">Peak Hours</h3>
    <canvas id="peakChart"></canvas>
  </div>

<div class="bg-white p-4 rounded-xl shadow">
  <h3 class="mb-2 font-semibold">Top Dishes</h3>

  <div class="h-52">
    <canvas id="dishChart"></canvas>
  </div>

</div>

</div>

<h2 class="text-2xl font-bold mt-6 mb-6 text-gray-800">📊 Demand Prediction</h2>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

  <div *ngFor="let item of demandData"
       class="bg-white rounded-2xl shadow-md hover:shadow-xl transition transform hover:-translate-y-1 overflow-hidden">

    <div class="h-40 bg-gray-200">
      <img [src]="getImageByName(item.dishName)"
           class="w-full h-full object-cover" />
    </div>

    <div class="p-5">

      <h3 class="text-lg font-semibold text-gray-800">
        {{ item.dishName }}
      </h3>

      <p class="text-gray-500 text-sm mt-1">
        Last Week: {{ item.lastWeekActual }}
      </p>

      <p class="text-blue-600 font-bold mt-2 text-lg">
        Predicted: {{ item.predictedNextWeek }}
      </p>

      <div class="mt-3">
        <div class="h-2 bg-gray-200 rounded">
          <div class="h-2 bg-green-500 rounded"
               [style.width.%]="item.trendPercent">
          </div>
        </div>
      </div>

      <div class="mt-3 flex justify-between text-sm">
        <span class="text-green-600 font-semibold">
          📈 {{ item.trendPercent }}%
        </span>

        <span class="text-gray-500">
          🎯 {{ item.confidencePercent }}%
        </span>
      </div>

    </div>

  </div>

  <div class="bg-white p-6 rounded-2xl shadow mt-12 max-w-4xl mx-auto">

  <h3 class="mb-6 font-semibold text-center text-lg text-gray-800">
    📈 Demand Forecast Overview
  </h3>

  <div class="flex justify-center gap-6 mb-6 flex-wrap">

    <div *ngFor="let item of demandData" class="text-center">
      <img [src]="getImageByName(item.dishName)"
           class="w-12 h-12 rounded-full object-cover mx-auto shadow" />
      <p class="text-xs mt-1 text-gray-600">
        {{ item.dishName }}
      </p>
    </div>

  </div>

  <div class="h-72">
    <canvas id="demandChart"></canvas>
  </div>

</div>

</div>
