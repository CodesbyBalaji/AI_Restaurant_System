<h2 class="text-3xl font-bold mb-8 text-center text-gray-800">Our Menu</h2>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 px-4">
  <div
    *ngFor="let item of menu"
    class="bg-white rounded-2xl shadow-md hover:shadow-2xl transform hover:-translate-y-2 transition duration-300 overflow-hidden"
  >
    <div class="relative">
      <img [src]="item.image" alt="{{ item.name }}" class="w-full h-48 object-cover" />

      <span class="absolute top-3 left-3 bg-blue-600 text-white text-xs px-3 py-1 rounded-full">
        {{ item.category }}
      </span>

      <span class="absolute top-3 right-3 bg-green-500 text-white text-xs px-3 py-1 rounded-full">
        Available
      </span>
    </div>

    <div class="p-5">
      <h3 class="text-xl font-semibold text-gray-800">
        {{ item.name }}
      </h3>

      <p class="text-gray-500 text-sm mt-1">Freshly prepared & delicious</p>

      <div class="mt-4 flex justify-between items-center">
        <span class="text-blue-600 font-bold text-lg"> ₹{{ item.price }} </span>

        <button
          (click)="goToOrder(item)"
          class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition"
        >
          Order Now
        </button>
      </div>
    </div>
  </div>
</div>
