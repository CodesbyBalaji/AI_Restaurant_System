<h2 class="text-2xl font-bold mb-6">Create Order</h2>

<div class="bg-white p-6 rounded-xl shadow max-w-md">

  <div class="mb-4">
    <label class="block mb-1 text-gray-600">Menu Item</label>
    <select [(ngModel)]="selectedItemId"
            class="w-full border p-2 rounded-lg">
      <option value="0">Select Item</option>
      <option *ngFor="let item of menu" [value]="item.id">
        {{ item.name }} - ₹{{ item.price }}
      </option>
    </select>
  </div>

  <div class="mb-4">
    <label class="block mb-1 text-gray-600">Quantity</label>
    <input type="number"
           [(ngModel)]="quantity"
           class="w-full border p-2 rounded-lg" />
  </div>

  <button (click)="placeOrder()"
          class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
    Place Order
  </button>

</div>
